<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prompt 段位测试 · AI predy 分享会 v10</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:#0f0f1a;color:#fff;min-height:100vh;padding:16px}
.c{max-width:480px;margin:0 auto}
h1{text-align:center;font-size:24px;font-weight:900;margin:20px 0 4px;background:linear-gradient(135deg,#7c3aed,#2563eb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:rgba(255,255,255,.5);font-size:12px;margin-bottom:16px}
.tb{display:flex;gap:6px;margin-bottom:16px;background:rgba(255,255,255,.04);border-radius:10px;padding:4px}
.tt{flex:1;padding:8px;text-align:center;border-radius:8px;color:rgba(255,255,255,.5);font-size:13px;font-weight:600;cursor:pointer}
.tt.a{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff}
.sec{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:12px}
label{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:6px;display:block}
input,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:11px;color:#fff;font-size:14px;outline:none}
input:focus,textarea:focus{border-color:#7c3aed}
textarea{min-height:80px;resize:vertical;line-height:1.5}
.btn{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
.btn:disabled{opacity:.4}
.em{background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.2);border-radius:10px;padding:10px;color:#ff6b6b;font-size:12px;margin-top:10px;display:none}
.sm{background:rgba(60,255,60,.08);border:1px solid rgba(60,255,60,.2);border-radius:10px;padding:10px;color:#6bff6b;font-size:12px;margin-top:10px;display:none}
.rc{display:none}.rc.show{display:block;text-align:center;padding:20px}
.re{font-size:50px}.rn{font-size:22px;font-weight:900;margin:8px 0}
.ss{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:12px 0}
.si{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;text-align:center}
.sl{font-size:10px;color:rgba(255,255,255,.5)}.sv{font-size:18px;font-weight:800}
.cm{font-size:12px;color:rgba(255,255,255,.5);padding:12px;background:rgba(255,255,255,.03);border-radius:8px;border-left:3px solid #7c3aed}
.lb{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px}
.lb h2{font-size:15px;font-weight:800;margin-bottom:12px;text-align:center}
.li{padding:10px 6px;border-bottom:1px solid rgba(255,255,255,.04)}
.li:last-child{border-bottom:none}
.lh{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.lr{width:28px;font-size:13px;font-weight:800;text-align:center;color:rgba(255,255,255,.4)}
.ln{flex:1;font-size:13px}.ls{font-size:15px;font-weight:800}
.lp{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;padding:6px 8px;background:rgba(255,255,255,.02);border-radius:6px;word-break:break-word}
.lt{font-size:10px;color:rgba(255,255,255,.2);margin-top:2px;text-align:right}
.lo{text-align:center;padding:16px;color:rgba(255,255,255,.4)}
.sp{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.15);border-top-color:#7c3aed;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#view-lb{display:none}
.debug{margin-top:12px;padding:10px;background:rgba(255,255,0,.05);border:1px solid rgba(255,255,0,.15);border-radius:8px;font-size:11px;color:rgba(255,255,100,.8);font-family:monospace;word-break:break-all;white-space:pre-wrap}
.pill{display:inline-block;padding:3px 10px;border-radius:16px;font-size:11px;background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(37,99,235,.2));border:1px solid rgba(124,58,237,.3);margin-bottom:12px}
</style>
</head>
<body>
<div class="c">
<h1>🤖 Prompt 段位测试</h1>
<p class="sub">AI predy 分享会</p>
<div style="text-align:center"><span class="pill" id="pill">🎮 加载中...</span></div>
<div class="tb">
<div class="tt a" id="t1" onclick="st('t')">⚡ 测试</div>
<div class="tt" id="t2" onclick="st('l')">🏆 排行榜</div>
</div>
<div id="vt">
<div class="sec"><label>你的薯名</label><input id="nk" maxlength="20" placeholder="输入薯名"/></div>
<div class="sec"><label>Prompt（最多 300 字）</label><textarea id="pi" maxlength="300" placeholder="帮我做一个..."></textarea></div>
<button class="btn" id="sb" onclick="go()">开始测试 ⚡</button>
<div class="em" id="em"></div>
<div class="sm" id="sm"></div>
<div class="rc" id="rc">
<div class="re" id="re"></div>
<div class="rn" id="rn"></div>
<div style="font-size:12px;color:rgba(255,255,255,.5)" id="rx"></div>
<div class="ss" id="ss"></div>
<div class="cm" id="cx"></div>
</div>
</div>
<div id="vl">
<div class="lb">
<h2>🏆 排行榜</h2>
<div class="lo" id="ll"><div class="sp"></div><br/>加载中...</div>
<div id="lx"></div>
</div>
</div>
<div class="debug" id="dbg">诊断信息加载中...</div>
</div>
<script>
var S={
  u:'https://hwsgawbvpkizpgwoybme.supabase.co',
  k:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3c2dhd2J2cGtpenBnd295Ym1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjU1NzgsImV4cCI6MjA5MTc0MTU3OH0.6AveHSFyHlBprWFaKp112TElHpdVQHXCx5rFOc2KUmw'
};
var D=[{k:'clarity',l:'指令清晰度',w:.3},{k:'detail',l:'细节丰富度',w:.25},{k:'creativity',l:'创意指数',w:.25},{k:'vibe',l:'Vibe 感',w:.2}];
var R=[
  {m:'🔥',n:'Vibe 大神',c:'#ff6b35',mn:80},
  {m:'⚡',n:'Prompt 工程师',c:'#a78bfa',mn:60},
  {m:'🚀',n:'进阶 Coder',c:'#38bdf8',mn:40},
  {m:'🌱',n:'潜力新星',c:'#4ade80',mn:20},
  {m:'🐣',n:'青铜 Coder',c:'#fbbf24',mn:0}
];
function sc(t){var s=t.trim(),l=s.length;var c=40;if(/做|生成|创建|写|设计|实现|帮我|给我/.test(s))c+=20;if(/游戏|页面|动画|效果|组件|界面|功能|系统/.test(s))c+=20;if(l>20)c+=5;if(l>40)c+=5;if(l>60)c+=5;if(l>80)c+=5;c=Math.min(c,100);var d=30;if(/粒子|物理|弹射|颜色|大小|速度|动效|渐变|阴影|圆角|响应式|移动端|流畅|丝滑|炫酷|动画|切换|主题|风格|布局|交互|拖拽|点击|滚动|悬浮|淡入|弹出|旋转|自适应|背景|按钮|输入/.test(s))d+=30;if(/\d/.test(s))d+=10;if(l>30)d+=5;if(l>50)d+=5;if(l>80)d+=5;if(l>100)d+=5;if(l>150)d+=5;d=Math.min(d,100);var r=35;if(/薯队长|大富翁|打砖块|跑酷|消消乐|弹幕|烟花|随机|赛博|像素|复古|贪吃蛇|俄罗斯方块|2048|塔防|模拟|RPG/.test(s))r+=30;if(s.indexOf(',')>=0||s.indexOf('，')>=0)r+=10;if(l>40)r+=10;if(l>80)r+=10;if(l>120)r+=5;r=Math.min(r,100);var v=40;if(/炸裂|爆炸|超酷|惊艳|漂亮|完美|绝了|有趣|好玩|丝滑|酷炫/.test(s))v+=25;if(/[吧呢哦呀嘛～！!✨🎉🔥]/.test(s))v+=15;if(l>30)v+=5;if(l>60)v+=5;if(l>100)v+=5;v=Math.min(v,100);var j=function(){return Math.round((Math.random()-.5)*10);};return{clarity:Math.min(100,Math.max(10,c+j())),detail:Math.min(100,Math.max(10,d+j())),creativity:Math.min(100,Math.max(10,r+j())),vibe:Math.min(100,Math.max(10,v+j()))};}
function tot(s){return Math.round(D.reduce(function(a,x){return a+s[x.k]*x.w;},0));}
function rk(t){for(var i=0;i<R.length;i++){if(t>=R[i].mn)return R[i];}return R[4];}

// ★★★ 诊断 + 数据加载 ★★★
var dbg=document.getElementById('dbg');
dbg.textContent='[1/3] 正在连接 Supabase...\nURL: '+S.u;

function api(method, url, body, cb){
  var xhr=new XMLHttpRequest();
  xhr.open(method, url, true);
  xhr.setRequestHeader('apikey', S.k);
  xhr.setRequestHeader('Authorization', 'Bearer '+S.k);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('Prefer', 'count=exact');
  
  var step = method==='GET' ? '读取数据' : '提交数据';
  dbg.textContent += '\n[2/3] 正在'+step+'...';
  dbg.textContent += '\n  → '+url;
  
  xhr.onreadystatechange = function(){
    dbg.textContent += '\n  XHR readyState: '+xhr.readyState+', status: '+xhr.status;
  };
  
  xhr.onload = function(){
    dbg.textContent += '\n  最终状态: HTTP '+xhr.status;
    dbg.textContent += '\n  响应长度: '+xhr.responseText.length+' 字符';
    
    if(xhr.status >= 400){
      dbg.textContent += '\n  ❌ 错误: '+xhr.responseText.slice(0,200);
      cb(new Error('HTTP '+xhr.status));
      return;
    }
    try{
      var txt = xhr.responseText;
      if(!txt || txt===''){
        dbg.textContent += '\n  ⚠️ 空响应，返回空数组';
        cb(null, []);
        return;
      }
      var data = JSON.parse(txt);
      dbg.textContent += '\n  ✅ 解析成功，'+data.length+' 条数据';
      if(data.length > 0){
        dbg.textContent += '\n  示例: '+data[0].nickname+' - '+data[0].total+'分';
      }
      cb(null, data);
    }catch(e){
      dbg.textContent += '\n  ❌ JSON 解析失败: '+e.message;
      dbg.textContent += '\n  原文: '+xhr.responseText.slice(0,100);
      cb(e, []);
    }
  };
  xhr.onerror = function(){
    dbg.textContent += '\n  ❌ 网络错误';
    cb(new Error('网络错误'));
  };
  xhr.ontimeout = function(){
    dbg.textContent += '\n  ❌ 请求超时';
    cb(new Error('超时'));
  };
  xhr.timeout = 15000;
  if(body) xhr.send(JSON.stringify(body));
  else xhr.send();
}

function loadData(cb){ api('GET', S.u+'/rest/v1/submissions?select=*&order=total.desc', null, cb); }

function submit(entry, cb){
  api('POST', S.u+'/rest/v1/submissions', {
    nickname:entry.nickname, prompt:entry.prompt, total:entry.total,
    rank_emoji:entry.rank.emoji, rank_name:entry.rank.name, rank_color:entry.rank.color,
    scores:entry.scores, time:entry.time
  }, cb);
}

function st(t){
  document.getElementById('t1').className='tt'+(t==='t'?' a':'');
  document.getElementById('t2').className='tt'+(t==='l'?' a':'');
  document.getElementById('vt').style.display=t==='t'?'':'none';
  document.getElementById('vl').style.display=t==='l'?'':'none';
  if(t==='l') loadLB();
}

function go(){
  var nk=document.getElementById('nk').value.trim();
  var txt=document.getElementById('pi').value.trim();
  if(!nk){document.getElementById('em').textContent='⚠️ 请输入薯名';document.getElementById('em').style.display='block';return;}
  if(!txt||txt.length<5){document.getElementById('em').textContent='⚠️ 至少 5 个字';document.getElementById('em').style.display='block';return;}
  document.getElementById('em').style.display='none';
  var btn=document.getElementById('sb');
  btn.disabled=true;btn.textContent='评估中...';
  var s=sc(txt),t=tot(s),r=rk(t);
  var entry={nickname:nk,prompt:txt,scores:D.map(function(d){return{label:d.l,value:s[d.k]};}),total:t,rank:{emoji:r.m,name:r.n,color:r.c},time:new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'})};
  submit(entry, function(err){
    btn.disabled=false;btn.textContent='开始测试 ⚡';
    if(err){document.getElementById('em').textContent='⚠️ '+err.message;document.getElementById('em').style.display='block';return;}
    document.getElementById('sm').textContent='✅ 成功！'+r.m+' '+r.n;document.getElementById('sm').style.display='block';
    document.getElementById('re').textContent=r.m;
    document.getElementById('rn').textContent=r.n;
    document.getElementById('rn').style.color=r.c;
    document.getElementById('rx').textContent=t+'分';
    document.getElementById('ss').innerHTML=D.map(function(d){return '<div class="si"><div class="sl">'+d.l+'</div><div class="sv" style="color:'+r.c+'">'+s[d.k]+'</div></div>';}).join('');
    document.getElementById('cx').textContent=t>=75?'🎯 细节拉满！':t>=45?'💡 方向对了，加细节。':'🤔 再加细节吧。';
    document.getElementById('rc').classList.add('show');
    // 自动刷新排行榜
    loadLB();
  });
}

function loadLB(){
  var ld=document.getElementById('ll');
  var lx=document.getElementById('lx');
  ld.style.display='';lx.innerHTML='';
  loadData(function(err, data){
    if(err){ld.style.display='none';lx.innerHTML='<div class="lo" style="color:#ff6b6b">错误: '+err.message+'</div>';return;}
    document.getElementById('pill').textContent='🎮 '+data.length+'人已参与';
    if(!data.length){ld.style.display='none';lx.innerHTML='<div class="lo">还没有人参与</div>';return;}
    var best={};data.forEach(function(x){var k=(x.nickname||'').toLowerCase();if(!best[k]||x.total>best[k].total)best[k]=x;});
    var arr=[];for(var k in best)arr.push(best[k]);
    arr.sort(function(a,b){return b.total-a.total;});
    arr=arr.slice(0,50);
    ld.style.display='none';
    lx.innerHTML=arr.map(function(x,i){
      var r=i<3?['🥇','🥈','🥉'][i]:(i+1);
      return '<div class="li"><div class="lh"><div class="lr">'+r+'</div><div class="ln">'+(x.rank_emoji||'')+' '+(x.nickname||'匿名')+'</div><div class="ls" style="color:'+(x.rank_color||'#fff')+'">'+x.total+'分</div></div><div class="lp">'+(x.prompt||'').replace(/</g,'&lt;')+'</div><div class="lt">'+(x.time||'')+'</div></div>';
    }).join('');
  });
}

// 初始加载
loadData(function(err, data){
  if(err){
    dbg.textContent += '\n[3/3] 初始加载失败: '+err.message;
    document.getElementById('pill').textContent='🎮 0人';
  } else {
    dbg.textContent += '\n[3/3] 初始加载完成: '+data.length+' 条';
    document.getElementById('pill').textContent='🎮 '+data.length+'人已参与';
  }
});
</script>
</body>
</html>
