<style>

body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,.12) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(37,99,235,.1) 0%,transparent 50%);animation:bgMove 20s ease-in-out infinite;z-index:-1}

h1{text-align:center;font-size:26px;font-weight:900;margin:24px 0 6px;background:linear-gradient(135deg,#7c3aed,#2563eb,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% auto;animation:shimmer 4s linear infinite}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}
.sub{text-align:center;color:rgba(255,255,255,.5);font-size:13px;margin-bottom:20px}
.ver{text-align:center;font-size:11px;color:rgba(255,255,255,.2);margin-bottom:12px}
.pills{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
.pill{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(37,99,235,.2));border:1px solid rgba(124,58,237,.3);color:rgba(255,255,255,.8)}
.tb{display:flex;gap:6px;margin-bottom:20px;background:rgba(255,255,255,.04);border-radius:12px;padding:4px}
.tt{flex:1;padding:10px;text-align:center;border-radius:10px;color:rgba(255,255,255,.5);font-size:14px;font-weight:600;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1)}
.tt.a{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 15px rgba(124,58,237,.4)}
.sec{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
label{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:8px;display:block;font-weight:500}
input,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:13px;color:#fff;font-size:15px;font-family:inherit;outline:none;transition:all .3s}

textarea{min-height:90px;resize:vertical;line-height:1.6}
.cc{text-align:right;font-size:11px;color:rgba(255,255,255,.3);margin-top:6px}
.ep{margin-top:10px}.ep span{font-size:12px;color:rgba(255,255,255,.35)}
.ec{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.ch{padding:5px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;font-size:11px;color:rgba(255,255,255,.6);cursor:pointer;transition:all .2s;white-space:nowrap}
.ch:hover{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.3);color:#fff}
.btn{width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .3s;position:relative;overflow:hidden}

.btn:hover::before{left:100%}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(124,58,237,.4)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn .loader{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.rc{display:none}.rc.show{display:block;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.rd{text-align:center;padding:24px;background:linear-gradient(135deg,rgba(124,58,237,.08),rgba(37,99,235,.08));border-radius:16px;margin-bottom:16px;border:1px solid rgba(124,58,237,.15)}

.li{padding:14px 10px;border-bottom:1px solid rgba(255,255,255,.04);animation:slideIn .4s ease both}
.li:last-child{border-bottom:none}
.li-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
@keyframes slideIn{from{opacity:0;transform:translateX(-15px)}to{opacity:1;transform:translateX(0)}}
.lr{width:30px;font-size:14px;font-weight:800;text-align:center;color:rgba(255,255,255,.4);flex-shrink:0}
.ln{flex:1;font-size:14px;font-weight:600}
.ls{font-size:16px;font-weight:800;flex-shrink:0}
.li-prompt{font-size:12px;color:rgba(255,255,255,.45);line-height:1.5;margin-top:6px;padding:8px 10px;background:rgba(255,255,255,.03);border-radius:8px;border-left:2px solid rgba(124,58,237,.3);word-break:break-word}
.li-time{font-size:11px;color:rgba(255,255,255,.25);margin-top:4px;text-align:right}
.lo{text-align:center;padding:24px;color:rgba(255,255,255,.4)}
.sp{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.confetti{position:fixed;top:-10px;width:8px;height:8px;border-radius:2px;animation:fall linear forwards;pointer-events:none;z-index:999}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
#view-lb{display:none}
#view-lb.show{display:block;animation:fadeUp .4s ease}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.95);border:1px solid var(--accent);border-radius:12px;padding:14px 24px;font-size:14px;z-index:999;animation:fadeUp .3s ease;max-width:90%;text-align:center}
</style>

<body>

</div>
<script>
console.log('✅ v9.0 loaded');
var SB_URL='https://hwsgawbvpkizpgwoybme.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3c2dhd2J2cGtpenBnd295Ym1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjU1NzgsImV4cCI6MjA5MTc0MTU3OH0.6AveHSFyHlBprWFaKp112TElHpdVQHXCx5rFOc2KUmw';
var SB_H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'count=exact'};

var DIMS=[{k:'clarity',l:'指令清晰度',w:.3},{k:'detail',l:'细节丰富度',w:.25},{k:'creativity',l:'创意指数',w:.25},{k:'vibe',l:'Vibe 感',w:.2}];
var RANKS=[
  {m:'🔥',n:'Vibe 大神',c:'#ff6b35',mn:80,s:'超越 99% 的用户'},
  {m:'⚡',n:'Prompt 工程师',c:'#a78bfa',mn:60,s:'专业级别'},
  {m:'🚀',n:'进阶 Coder',c:'#38bdf8',mn:40,s:'思路清晰'},
  {m:'🌱',n:'潜力新星',c:'#4ade80',mn:20,s:'继续打磨就能起飞'},
  {m:'🐣',n:'青铜 Coder',c:'#fbbf24',mn:0,s:'万事开头难'}
];

function calcScore(t){
  var s=t.trim(),len=s.length;
  var cl=40;
  if(/做|生成|创建|写|设计|实现|帮我|给我/.test(s))cl+=20;
  if(/游戏|页面|动画|效果|组件|界面|功能|系统/.test(s))cl+=20;
  if(len>20)cl+=5;if(len>40)cl+=5;if(len>60)cl+=5;if(len>80)cl+=5;
  cl=Math.min(cl,100);
  var dt=30;
  if(/粒子|物理|弹射|颜色|大小|速度|动效|渐变|阴影|圆角|响应式|移动端|流畅|丝滑|炫酷|动画|切换|主题|风格|布局|交互|拖拽|点击|滚动|悬浮|淡入|弹出|旋转|自适应|背景|按钮|输入/.test(s))dt+=30;
  if(/\d/.test(s))dt+=10;
  if(len>30)dt+=5;if(len>50)dt+=5;if(len>80)dt+=5;if(len>100)dt+=5;if(len>150)dt+=5;
  dt=Math.min(dt,100);
  var cr=35;
  if(/薯队长|大富翁|打砖块|跑酷|消消乐|弹幕|烟花|随机|赛博|像素|复古|贪吃蛇|俄罗斯方块|2048|塔防|模拟|RPG/.test(s))cr+=30;
  if(s.indexOf('，')>=0||s.indexOf(',')>=0)cr+=10;
  if(len>40)cr+=10;if(len>80)cr+=10;if(len>120)cr+=5;
  cr=Math.min(cr,100);
  var vb=40;
  if(/炸裂|爆炸|超酷|惊艳|漂亮|完美|绝了|有趣|好玩|丝滑|酷炫/.test(s))vb+=25;
  if(/[吧呢哦呀嘛～！!✨🎉🔥]/.test(s))vb+=15;
  if(len>30)vb+=5;if(len>60)vb+=5;if(len>100)vb+=5;
  vb=Math.min(vb,100);
  var j=function(){return Math.round((Math.random()-.5)*10);};
  return{
    clarity:Math.min(100,Math.max(10,cl+j())),
    detail:Math.min(100,Math.max(10,dt+j())),
    creativity:Math.min(100,Math.max(10,cr+j())),
    vibe:Math.min(100,Math.max(10,vb+j()))
  };
}

function calcTotal(s){return Math.round(DIMS.reduce(function(a,d){return a+s[d.k]*d.w;},0));}
function getRank(t){for(var i=0;i<RANKS.length;i++){if(t>=RANKS[i].mn)return RANKS[i];}return RANKS[4];}
function getComment(t){return t>=75?'🎯 细节拉满！':t>=45?'💡 方向对了，加点细节。':'🤔 再加点细节吧。';}

// ★★★ 核心 fetch：用 XMLHttpRequest 代替 fetch，兼容性更好 ★★★
function sbGet(url, cb){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',url,true);
  xhr.setRequestHeader('apikey',SB_KEY);
  xhr.setRequestHeader('Authorization','Bearer '+SB_KEY);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.onload=function(){
    if(xhr.status>=400){cb(new Error('HTTP '+xhr.status),[]);return;}
    try{
      var text=xhr.responseText;
      if(!text||text===''){cb(null,[]);return;}
      cb(null,JSON.parse(text));
    }catch(e){cb(e,[]);}
  };
  xhr.onerror=function(){cb(new Error('网络错误'),[]);};
  xhr.ontimeout=function(){cb(new Error('超时'),[]);};
  xhr.timeout=15000;
  xhr.send();
}

function sbPost(url,body,cb){
  var xhr=new XMLHttpRequest();
  xhr.open('POST',url,true);
  xhr.setRequestHeader('apikey',SB_KEY);
  xhr.setRequestHeader('Authorization','Bearer '+SB_KEY);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.onload=function(){
    if(xhr.status>=400){
      var t=xhr.responseText||'';
      if(t.indexOf('unique')>=0){cb(new Error('你已经提交过啦 🎉'));return;}
      cb(new Error('提交失败('+xhr.status+')'));return;
    }
    try{
      var text=xhr.responseText;
      cb(null,text?JSON.parse(text):null);
    }catch(e){cb(null,null);}
  };
  xhr.onerror=function(){cb(new Error('网络错误'));};
  xhr.ontimeout=function(){cb(new Error('超时'));};
  xhr.timeout=15000;
  xhr.send(JSON.stringify(body));
}

function loadData(cb){
  sbGet(SB_URL+'/rest/v1/submissions?select=*&order=total.desc',cb);
}

function checkPlayed(nk,cb){
  sbGet(SB_URL+'/rest/v1/submissions?select=nickname&nickname=eq.'+encodeURIComponent(nk)+'&limit=1',function(err,data){
    if(err){cb(false);return;}
    cb(data.length>0);
  });
}

function submitData(entry,cb){
  sbPost(SB_URL+'/rest/v1/submissions',{
    nickname:entry.nickname,
    prompt:entry.prompt,
    total:entry.total,
    rank_emoji:entry.rank.emoji,
    rank_name:entry.rank.name,
    rank_color:entry.rank.color,
    scores:entry.scores,
    time:entry.time
  },cb);
}

function showErr(m){var e=document.getElementById('errorMsg');e.textContent='⚠️ '+m;e.style.display='block';document.getElementById('successMsg').style.display='none';}
function showOk(m){var e=document.getElementById('successMsg');e.textContent='✅ '+m;e.style.display='block';document.getElementById('errorMsg').style.display='none';}

function switchTab(tab){
  document.getElementById('tab-test').classList.toggle('a',tab==='test');
  document.getElementById('tab-lb').classList.toggle('a',tab==='lb');
  document.getElementById('view-test').style.display=tab==='test'?'':'none';
  var v=document.getElementById('view-lb');
  v.style.display=tab==='lb'?'':'none';
  if(tab==='lb')loadLB();
}

function updateCount(){document.getElementById('charCount').textContent=document.getElementById('prompt').value.length;}
function fillPrompt(el){document.getElementById('prompt').value=el.textContent;updateCount();}

function doConfetti(){
  var colors=['#7c3aed','#2563eb','#06b6d4','#f59e0b','#ef4444','#10b981','#ec4899'];
  for(var i=0;i<40;i++){
    (function(idx){
      setTimeout(function(){
        var c=document.createElement('div');c.className='confetti';
        c.style.left=Math.random()*100+'vw';
        c.style.background=colors[Math.floor(Math.random()*colors.length)];
        c.style.animationDuration=(1.5+Math.random()*2)+'s';
        c.style.width=(6+Math.random()*6)+'px';c.style.height=c.style.width;
        document.body.appendChild(c);
        setTimeout(function(){c.remove();},4000);
      },idx*50);
    })(i);
  }
}

function submitScore(){
  var nk=document.getElementById('nickname').value.trim();
  var txt=document.getElementById('prompt').value.trim();
  if(!nk){showErr('请输入薯名');return;}
  if(!txt||txt.length<5){showErr('Prompt 太短，至少 5 个字');return;}
  var btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.innerHTML='<span class="loader"></span>AI 评估中...';
  document.getElementById('errorMsg').style.display='none';

  var sc=calcScore(txt);
  var t=calcTotal(sc);
  var rk=getRank(t);
  var cm=getComment(t);

  checkPlayed(nk,function(played){
    if(played){showErr('你已经提交过啦 🎉');btn.disabled=false;btn.textContent='开始测试段位 ⚡';return;}

    var entry={nickname:nk,prompt:txt,scores:DIMS.map(function(d){return{label:d.l,value:sc[d.k]};}),total:t,rank:{emoji:rk.m,name:rk.n,color:rk.c},time:new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'})};

    submitData(entry,function(err){
      if(err){showErr(err.message);btn.disabled=false;btn.textContent='开始测试段位 ⚡';return;}

      showOk('提交成功！段位：'+rk.m+' '+rk.n);
      document.getElementById('rankEmoji').textContent=rk.m;
      document.getElementById('rankName').textContent=rk.n;
      document.getElementById('rankName').style.color=rk.c;
      document.getElementById('rankSub').textContent='总分 '+t+' 分 · '+rk.s;
      document.getElementById('scoreGrid').innerHTML=DIMS.map(function(d){return '<div class="si"><div class="sl">'+d.l+'</div><div class="sv" style="color:'+rk.c+'">'+sc[d.k]+'</div></div>';}).join('');
      document.getElementById('comment').textContent=cm;
      document.getElementById('comment').style.borderLeftColor=rk.c;
      document.getElementById('resultCard').classList.add('show');
      doConfetti();

      // ★★★ 关键修复：提交成功后自动刷新排行榜 ★★★
      refreshLB();

      btn.disabled=false;btn.textContent='开始测试段位 ⚡';
    });
  });
}

function renderLB(data){
  var ld=document.getElementById('lbLoading');
  var ll=document.getElementById('lbList');
  document.getElementById('countPill').textContent='🎮 '+data.length+'人已参与';
  if(!data.length){ld.style.display='none';ll.innerHTML='<div class="lo">还没有人参与</div>';return;}
  var best={};
  data.forEach(function(x){
    var k=(x.nickname||'').toLowerCase();
    if(!best[k]||x.total>best[k].total)best[k]=x;
  });
  var sorted=[];
  for(var k in best){sorted.push(best[k]);}
  sorted.sort(function(a,b){return b.total-a.total;});
  sorted=sorted.slice(0,50);
  ld.style.display='none';
  ll.innerHTML=sorted.map(function(x,i){
    var r=i<3?['🥇','🥈','🥉'][i]:(i+1);
    return '<div class="li"><div class="li-header"><div class="lr">'+r+'</div><div class="ln">'+(x.rank_emoji||'')+' '+(x.nickname||'匿名')+'</div><div class="ls" style="color:'+(x.rank_color||'#fff')+'">'+x.total+'分</div></div><div class="li-prompt">'+(x.prompt||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div><div class="li-time">🕐 '+(x.time||'')+'</div></div>';
  }).join('');
}

function loadLB(){
  var ld=document.getElementById('lbLoading');
  var ll=document.getElementById('lbList');
  ld.style.display='';ll.innerHTML='';
  loadData(function(err,data){
    if(err){ld.style.display='none';ll.innerHTML='<div class="lo" style="color:#ff6b6b">加载失败：'+err.message+'</div>';return;}
    renderLB(data);
  });
}

function refreshLB(){loadData(function(err,data){if(!err)renderLB(data);});}

// 页面加载时预加载数据
loadData(function(err,data){
  if(!err&&data)document.getElementById('countPill').textContent='🎮 '+data.length+'人已参与';
  else document.getElementById('countPill').textContent='🎮 0人已参与';
});
</script>
