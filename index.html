<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Prompt 段位测试 · AI predy 分享会</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:#0f0f1a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,.12) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(37,99,235,.1) 0%,transparent 50%);animation:bgMove 20s ease-in-out infinite;z-index:-1}
@keyframes bgMove{0%,100%{transform:translate(0,0)}50%{transform:translate(-5%,3%)}}
.c{width:100%;max-width:480px}
h1{text-align:center;font-size:26px;font-weight:900;margin:24px 0 6px;background:linear-gradient(135deg,#7c3aed,#2563eb,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% auto;animation:shimmer 4s linear infinite}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}
.sub{text-align:center;color:rgba(255,255,255,.5);font-size:13px;margin-bottom:20px}
.pills{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
.pill{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(37,99,235,.2));border:1px solid rgba(124,58,237,.3);color:rgba(255,255,255,.8)}
.notice{background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(245,158,11,.06));border:1px solid rgba(251,191,36,.2);border-radius:14px;padding:14px 16px;margin-bottom:18px;font-size:12.5px;line-height:1.8;color:rgba(255,255,255,.75)}
.notice strong{color:#fbbf24;font-weight:700}
.tb{display:flex;gap:6px;margin-bottom:20px;background:rgba(255,255,255,.04);border-radius:12px;padding:4px}
.tt{flex:1;padding:10px;text-align:center;border-radius:10px;color:rgba(255,255,255,.5);font-size:14px;font-weight:600;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1)}
.tt.a{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;box-shadow:0 4px 15px rgba(124,58,237,.4)}
.sec{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px;margin-bottom:14px;backdrop-filter:blur(10px)}
label{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:8px;display:block;font-weight:500}
.hint{font-size:11.5px;color:rgba(255,100,100,.8);margin-bottom:8px;display:block;background:rgba(255,60,60,.06);border:1px solid rgba(255,60,60,.15);border-radius:8px;padding:8px 10px;line-height:1.6}
input,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:13px;color:#fff;font-size:15px;font-family:inherit;outline:none;transition:all .3s}
input:focus,textarea:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.15)}
textarea{min-height:90px;resize:vertical;line-height:1.6}
.cc{text-align:right;font-size:11px;color:rgba(255,255,255,.3);margin-top:6px}
.ep{margin-top:10px}.ep span{font-size:12px;color:rgba(255,255,255,.35)}
.ec{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.ch{padding:5px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;font-size:11px;color:rgba(255,255,255,.6);cursor:pointer;transition:all .2s;white-space:nowrap}
.ch:hover{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.3);color:#fff}
.btn{width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .3s;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .5s}
.btn:hover::before{left:100%}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(124,58,237,.4)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn .loader{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.rc{display:none}.rc.show{display:block;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.rd{text-align:center;padding:24px;background:linear-gradient(135deg,rgba(124,58,237,.08),rgba(37,99,235,.08));border-radius:16px;margin-bottom:16px;border:1px solid rgba(124,58,237,.15)}
.re{font-size:60px;animation:bounce 2s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.rn{font-size:26px;font-weight:900;margin:10px 0 4px}
.rx{font-size:14px;color:rgba(255,255,255,.5)}
.ss{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.si{background:rgba(255,255,255,.04);border-radius:12px;padding:12px;text-align:center;border:1px solid rgba(255,255,255,.08)}
.sl{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:4px}
.sv{font-size:20px;font-weight:800}
.cm{font-size:13px;color:rgba(255,255,255,.6);line-height:1.7;padding:14px;background:rgba(255,255,255,.04);border-radius:12px;border-left:3px solid #7c3aed}
.em{background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.2);border-radius:12px;padding:12px;color:#ff6b6b;font-size:13px;margin-top:12px;display:none}
.sm{background:rgba(60,255,60,.08);border:1px solid rgba(60,255,60,.2);border-radius:12px;padding:12px;color:#6bff6b;font-size:13px;margin-top:12px;display:none}
.lb{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px}
.lb-header{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
.lb-header h2{font-size:16px;font-weight:800}
.live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.live-label{font-size:11px;color:#22c55e;font-weight:600}
.li{padding:14px 10px;border-bottom:1px solid rgba(255,255,255,.04);animation:slideIn .4s ease both}
.li:last-child{border-bottom:none}
.li-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
@keyframes slideIn{from{opacity:0;transform:translateX(-15px)}to{opacity:1;transform:translateX(0)}}
.lr{width:30px;font-size:14px;font-weight:800;text-align:center;color:rgba(255,255,255,.4);flex-shrink:0}
.ln{flex:1;font-size:14px;font-weight:600}
.ls{font-size:16px;font-weight:800;flex-shrink:0}
.li-prompt{font-size:12px;color:rgba(255,255,255,.45);line-height:1.5;margin-top:6px;padding:8px 10px;background:rgba(255,255,255,.03);border-radius:8px;border-left:2px solid rgba(124,58,237,.3);word-break:break-word}
.li-time{font-size:11px;color:rgba(255,255,255,.25);margin-top:4px;text-align:right}
.lo{text-align:center;padding:24px;color:rgba(255,255,255,.4)}
.sp{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.15);border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite}
.confetti{position:fixed;top:-10px;width:8px;height:8px;border-radius:2px;animation:fall linear forwards;pointer-events:none;z-index:999}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
footer{text-align:center;padding:30px 0 20px;color:rgba(255,255,255,.2);font-size:11px}
</style>
</head>
<body>
<div class="c">
<h1>🤖 Prompt 段位测试</h1>
<p class="sub">AI predy 分享会 · 测测你的 Prompt 水平</p>
<div class="pills"><span class="pill" id="pill">🎮 加载中...</span></div>
<div class="notice">
<strong>⚠️ 提醒：</strong>请填写<strong>真实薯名</strong>，奖品将在报名分享会的同学中产生。如遇分数相同，则优先选取<strong>发布时间较早</strong>的同学送出礼物。
</div>
<div class="tb">
<div class="tt a" id="t1" onclick="sw('t')">⚡ 测试</div>
<div class="tt" id="t2" onclick="sw('l')">🏆 排行榜</div>
</div>

<div id="vt">
<div class="sec"><label>你的薯名</label><input id="nk" maxlength="20" placeholder="输入你的薯名" autocomplete="off"/></div>
<div class="sec">
<label>写一句 Prompt（最多 300 字）</label>
<span class="hint">⚠️ 每人只有一次提交机会，请组织好你的 Prompt 再提交！</span>
<textarea id="pi" maxlength="300" placeholder="帮我做一个..." oninput="uc()"></textarea>
<div class="cc"><span id="cc">0</span>/300</div>
<div class="ep"><span>不知道写什么？试试：</span>
<div class="ec">
<span class="ch" onclick="fp(this)">帮我做一个打砖块游戏，带粒子特效和音效</span>
<span class="ch" onclick="fp(this)">生成赛博朋克风格个人主页，带霓虹灯动效</span>
<span class="ch" onclick="fp(this)">做一个像素风贪吃蛇，支持手机触屏操作</span>
<span class="ch" onclick="fp(this)">创建一个3D旋转地球仪，实时显示天气数据</span>
</div></div>
</div>
<button class="btn" id="sb" onclick="go()">开始测试段位 ⚡</button>
<div class="em" id="em"></div><div class="sm" id="sm"></div>
<div class="rc" id="rc">
<div class="rd"><div class="re" id="re"></div><div class="rn" id="rn"></div><div class="rx" id="rx"></div></div>
<div class="ss" id="sg"></div><div class="cm" id="cx"></div>
</div>
</div>

<div id="vl" style="display:none">
<div class="lb">
<div class="lb-header">
<div class="live-dot"></div>
<h2>🏆 排行榜 · TOP 50</h2>
<span class="live-label">实时更新</span>
</div>
<div id="ld" class="lo"><div class="sp"></div><br/>加载中...</div>
<div id="lx"></div>
</div>
</div>
<footer>AI predy 分享会</footer>
</div>
<script>
var SB_URL='https://hwsgawbvpkizpgwoybme.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3c2dhd2J2cGtpenBnd295Ym1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjU1NzgsImV4cCI6MjA5MTc0MTU3OH0.6AveHSFyHlBprWFaKp112TElHpdVQHXCx5rFOc2KUmw';
var D=[{k:'clarity',l:'指令清晰度',w:.3},{k:'detail',l:'细节丰富度',w:.25},{k:'creativity',l:'创意指数',w:.25},{k:'vibe',l:'Vibe 感',w:.2}];
var R=[{m:'🔥',n:'Vibe 大神',c:'#ff6b35',mn:80},{m:'⚡',n:'Prompt 工程师',c:'#a78bfa',mn:60},{m:'🚀',n:'进阶 Coder',c:'#38bdf8',mn:40},{m:'🌱',n:'潜力新星',c:'#4ade80',mn:20},{m:'🐣',n:'青铜 Coder',c:'#fbbf24',mn:0}];
var lbTimer=null;
var currentTab='t';

function fetchLB(cb){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',SB_URL+'/rest/v1/submissions?select=*&order=total.desc,created_at.asc',true);
  xhr.setRequestHeader('apikey',SB_KEY);
  xhr.setRequestHeader('Authorization','Bearer '+SB_KEY);
  xhr.onload=function(){
    if(xhr.status>=400||!xhr.responseText){cb([]);return;}
    try{cb(JSON.parse(xhr.responseText));}catch(e){cb([]);}
  };
  xhr.onerror=function(){cb([]);};
  xhr.timeout=8000;
  xhr.ontimeout=function(){cb([]);};
  xhr.send();
}

function renderLB(data){
  document.getElementById('ld').style.display='none';
  var lx=document.getElementById('lx');
  document.getElementById('pill').textContent='🎮 '+data.length+'人已参与';
  if(!data.length){lx.innerHTML='<div class="lo">还没有人参与，快来第一个！</div>';return;}
  var best={};
  data.forEach(function(x){var k=(x.nickname||'').toLowerCase();if(!best[k]||x.total>best[k].total)best[k]=x;});
  var arr=[];for(var k in best)arr.push(best[k]);
  arr.sort(function(a,b){return b.total-a.total||new Date(a.created_at)-new Date(b.created_at);});
  arr=arr.slice(0,50);
  var html='';
  arr.forEach(function(x,i){
    var r=i<3?['🥇','🥈','🥉'][i]:(i+1);
    var p=(x.prompt||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html+='<div class="li"><div class="li-header"><div class="lr">'+r+'</div><div class="ln">'+(x.rank_emoji||'')+' '+(x.nickname||'匿名')+'</div><div class="ls" style="color:'+(x.rank_color||'#fff')+'">'+(x.total||0)+'分</div></div><div class="li-prompt">'+p+'</div><div class="li-time">🕐 '+(x.time||'')+'</div></div>';
  });
  lx.innerHTML=html;
}

function loadLB(){
  document.getElementById('ld').style.display='';
  fetchLB(function(data){renderLB(data);});
}

function startLBPolling(){
  if(lbTimer)return;
  loadLB();
  lbTimer=setInterval(function(){fetchLB(function(data){renderLB(data);});},10000);
}

function stopLBPolling(){
  if(lbTimer){clearInterval(lbTimer);lbTimer=null;}
}

function sw(t){
  currentTab=t;
  document.getElementById('t1').className='tt'+(t==='t'?' a':'');
  document.getElementById('t2').className='tt'+(t==='l'?' a':'');
  document.getElementById('vt').style.display=t==='t'?'block':'none';
  document.getElementById('vl').style.display=t==='l'?'block':'none';
  if(t==='l'){startLBPolling();}else{stopLBPolling();}
}

function uc(){document.getElementById('cc').textContent=document.getElementById('pi').value.length;}
function fp(el){document.getElementById('pi').value=el.textContent;uc();}

function calc(t){var s=t.trim(),l=s.length;var c=40;if(/做|生成|创建|写|设计|实现|帮我|给我/.test(s))c+=20;if(/游戏|页面|动画|效果|组件|界面|功能|系统/.test(s))c+=20;if(l>20)c+=5;if(l>40)c+=5;if(l>60)c+=5;if(l>80)c+=5;c=Math.min(c,100);var d=30;if(/粒子|物理|弹射|颜色|大小|速度|动效|渐变|阴影|圆角|响应式|移动端|流畅|丝滑|炫酷|动画|切换|主题|风格|布局|交互|拖拽|点击|滚动|悬浮|淡入|弹出|旋转|自适应|背景|按钮|输入/.test(s))d+=30;if(/\d/.test(s))d+=10;if(l>30)d+=5;if(l>50)d+=5;if(l>80)d+=5;if(l>100)d+=5;if(l>150)d+=5;d=Math.min(d,100);var r=35;if(/薯队长|大富翁|打砖块|跑酷|消消乐|弹幕|烟花|随机|赛博|像素|复古|贪吃蛇|俄罗斯方块|2048|塔防|模拟|RPG/.test(s))r+=30;if(s.indexOf(',')>=0||s.indexOf('\uFF0C')>=0)r+=10;if(l>40)r+=10;if(l>80)r+=10;if(l>120)r+=5;r=Math.min(r,100);var v=40;if(/炸裂|爆炸|超酷|惊艳|漂亮|完美|绝了|有趣|好玩|丝滑|酷炫/.test(s))v+=25;if(/[\u5427\u5462\u54E6\u5440\u561B\uFF5E\uFF01!]/.test(s))v+=15;if(l>30)v+=5;if(l>60)v+=5;if(l>100)v+=5;v=Math.min(v,100);var j=function(){return Math.round((Math.random()-.5)*10);};return{clarity:Math.min(100,Math.max(10,c+j())),detail:Math.min(100,Math.max(10,d+j())),creativity:Math.min(100,Math.max(10,r+j())),vibe:Math.min(100,Math.max(10,v+j()))};}
function tot(s){return Math.round(D.reduce(function(a,x){return a+s[x.k]*x.w;},0));}
function getr(t){for(var i=0;i<R.length;i++){if(t>=R[i].mn)return R[i];}return R[4];}
function confetti(){var colors=['#7c3aed','#2563eb','#06b6d4','#f59e0b','#ef4444','#10b981','#ec4899'];for(var i=0;i<40;i++){(function(idx){setTimeout(function(){var c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background=colors[Math.floor(Math.random()*colors.length)];c.style.animationDuration=(1.5+Math.random()*2)+'s';c.style.width=(6+Math.random()*6)+'px';c.style.height=c.style.width;document.body.appendChild(c);setTimeout(function(){c.remove();},4000);},idx*50);})(i);}}

function go(){
  var nk=document.getElementById('nk').value.trim();
  var txt=document.getElementById('pi').value.trim();
  if(!nk){document.getElementById('em').textContent='\u26a0\ufe0f 请输入薯名';document.getElementById('em').style.display='block';return;}
  if(!txt||txt.length<5){document.getElementById('em').textContent='\u26a0\ufe0f Prompt 太短，至少 5 个字';document.getElementById('em').style.display='block';return;}
  document.getElementById('em').style.display='none';
  var btn=document.getElementById('sb');
  btn.disabled=true;btn.innerHTML='<span class="loader"></span>AI 评估中...';
  var s=calc(txt),t=tot(s),r=getr(t);
  var entry={nickname:nk,prompt:txt,total:t,rank_emoji:r.m,rank_name:r.n,rank_color:r.c,scores:D.map(function(d){return{label:d.l,value:s[d.k]};}),time:new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'})};
  var xhr=new XMLHttpRequest();
  xhr.open('POST',SB_URL+'/rest/v1/submissions',true);
  xhr.setRequestHeader('apikey',SB_KEY);
  xhr.setRequestHeader('Authorization','Bearer '+SB_KEY);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.onload=function(){
    btn.disabled=false;btn.textContent='开始测试段位 \u26a1';
    if(xhr.status===409){document.getElementById('em').textContent='\u26a0\ufe0f 你已经提交过啦，每人只有一次机会 \ud83c\udf89';document.getElementById('em').style.display='block';return;}
    if(xhr.status>=400){document.getElementById('em').textContent='\u26a0\ufe0f 提交失败('+xhr.status+')';document.getElementById('em').style.display='block';return;}
    document.getElementById('sm').textContent='\u2705 提交成功！段位：'+r.m+' '+r.n;document.getElementById('sm').style.display='block';
    document.getElementById('re').textContent=r.m;
    document.getElementById('rn').textContent=r.n;document.getElementById('rn').style.color=r.c;
    document.getElementById('rx').textContent='总分 '+t+' 分';
    document.getElementById('sg').innerHTML=D.map(function(d){return '<div class="si"><div class="sl">'+d.l+'</div><div class="sv" style="color:'+r.c+'">'+s[d.k]+'</div></div>';}).join('');
    document.getElementById('cx').textContent=t>=75?'\ud83c\udfaf 细节拉满！':t>=45?'\ud83d\udca1 方向对了，加细节。':'\ud83e\udd14 再加细节吧。';
    document.getElementById('rc').classList.add('show');
    confetti();
    setTimeout(function(){sw('l');},2000);
  };
  xhr.onerror=function(){btn.disabled=false;btn.textContent='开始测试段位 \u26a1';document.getElementById('em').textContent='\u26a0\ufe0f 网络错误';document.getElementById('em').style.display='block';};
  xhr.ontimeout=function(){btn.disabled=false;btn.textContent='开始测试段位 \u26a1';document.getElementById('em').textContent='\u26a0\ufe0f 超时';document.getElementById('em').style.display='block';};
  xhr.timeout=15000;
  xhr.send(JSON.stringify(entry));
}

// 初始加载参与人数
fetchLB(function(data){document.getElementById('pill').textContent='\ud83c\udfae '+data.length+'人已参与';});
</script>
</body>
</html>
